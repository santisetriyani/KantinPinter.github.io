function pMLoy(){var tier=S.pts>=500?'Gold':S.pts>=200?'Silver':'Bronze';var tc=S.pts>=500?'from-amber-400 to-yellow-500':S.pts>=200?'from-slate-300 to-slate-400':'from-amber-700 to-amber-800';var nxt=S.pts>=500?0:S.pts>=200?500-S.pts:200-S.pts;return'<div class="pg min-h-screen pb-24">'+MH('Pinter Points','mH')+'<div class="px-5 -mt-4 space-y-4"><div class="card p-6 text-center bg-gradient-to-br from-slate-50 to-white"><div class="w-20 h-20 rounded-full bg-gradient-to-br '+tc+' flex items-center justify-center mx-auto mb-3 shadow-lg"><i class="fa-solid fa-coins text-white text-3xl"></i></div><p class="text-3xl font-black text-slate-800 cnt">'+S.pts+'</p><p class="text-xs text-slate-400">Pinter Points</p><div class="mt-2"><span class="badge bg-gradient-to-r '+tc+' text-white text-xs px-3 py-1">'+tier+'</span></div>'+(nxt>0?'<p class="text-[10px] text-slate-400 mt-2">'+nxt+' poin lagi ke '+(S.pts>=200?'Gold':'Silver')+'</p>':'<p class="text-[10px] text-uo mt-2 font-bold">Tier tertinggi!</p>')+'</div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-3"><i class="fa-solid fa-gift text-uo mr-2"></i>Cara Dapat Poin</h3><div class="space-y-2">'+[{ic:'fa-qrcode text-blue-500',t:'Transaksi QRIS',d:'+1 poin / Rp1.000'},{ic:'fa-graduation-cap text-uj',t:'Lulus Kuis Modul',d:'+50 poin'},{ic:'fa-flag text-red-500',t:'Lapor Pelanggaran',d:'+10 poin'},{ic:'fa-ticket text-uo',t:'Klaim Voucher',d:'+25 poin'}].map(function(x){return'<div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0"><div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center"><i class="fa-solid '+x.ic+' text-sm"></i></div><div class="flex-1"><p class="text-xs font-semibold text-slate-700">'+x.t+'</p><p class="text-[10px] text-slate-400">'+x.d+'</p></div></div>'}).join('')+'</div></div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-3"><i class="fa-solid fa-exchange-alt text-uj mr-2"></i>Tukar Poin (Segera)</h3><div class="space-y-2">'+[{p:200,r:'Diskon Rp5.000'},{p:500,r:'Gratis 1 menu (max 15rb)'},{p:1000,r:'Gift Card Rp25.000'}].map(function(x){return'<div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 '+(S.pts>=x.p?'':'opacity-50')+'"><div><p class="text-xs font-bold text-slate-700">'+x.r+'</p><p class="text-[10px] text-slate-400">'+x.p+' poin</p></div>'+(S.pts>=x.p?'<button onclick="toast(\'Fitur segera hadir!\',\'info\')" class="ch px-3 py-1.5 bg-uj text-white rounded-lg text-[10px] font-bold">Tukar</button>':'<span class="badge bg-slate-100 text-slate-400">Kurang</span>')+'</div>'}).join('')+'</div></div></div></div>'}
function pBH(){return'<div class="pg min-h-screen pb-24">'+BH('Dashboard BPU')+'<div class="px-5 -mt-4 space-y-4"><div class="grid grid-cols-2 gap-2"><div class="card p-4 text-center ch"><p class="text-2xl font-extrabold cnt">'+U.length+'</p><p class="text-[10px] text-slate-400">UMKM</p></div><div class="card p-4 text-center ch"><p class="text-2xl font-extrabold text-blue-600 cnt">68%</p><p class="text-[10px] text-slate-400">Kelulusan</p></div><div class="card p-4 text-center ch"><p class="text-2xl font-extrabold text-uj cnt">'+U.filter(function(u){return u.qr}).length+'</p><p class="text-[10px] text-slate-400">QRIS</p></div><div class="card p-4 text-center ch"><p class="text-2xl font-extrabold text-red-500 cnt">'+RPT.filter(function(r){return r.st==='baru'}).length+'</p><p class="text-[10px] text-slate-400">Laporan</p></div></div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-2"><i class="fa-solid fa-chart-pie text-blue-500 mr-2"></i>Status Laporan</h3><div class="h-40"><canvas id="bPie"></canvas></div></div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-3"><i class="fa-solid fa-ticket text-uo mr-2"></i>Voucher Aktif</h3>'+VOU.filter(function(v){return v.act}).map(function(v){return'<div class="flex items-center justify-between py-2 border-b border-slate-50 last:border-0"><div><p class="text-xs font-semibold text-slate-700">'+v.nm+'</p><p class="text-[10px] text-slate-400">'+v.used+'/'+v.limit+' dipakai</p></div><span class="badge bg-emerald-100 text-emerald-600">'+v.cd+'</span></div>'}).join('')+'</div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-3"><i class="fa-solid fa-flag text-red-500 mr-2"></i>Laporan Terbaru</h3>'+RPT.slice(0,3).map(function(r){var sc={baru:'bg-red-100 text-red-600',diproses:'bg-amber-100 text-amber-600',selesai:'bg-emerald-100 text-emerald-600'}[r.st];return'<div class="flex items-center gap-3 py-2.5 border-b border-slate-50 last:border-0"><div class="w-8 h-8 rounded-lg '+sc+' flex items-center justify-center"><i class="fa-solid fa-flag text-xs"></i></div><div class="flex-1"><p class="text-xs font-semibold text-slate-700">'+r.um+'</p><p class="text-[10px] text-slate-400">'+r.dt2+'</p></div><span class="badge '+sc+'">'+r.st+'</span></div>'}).join('')+'</div></div></div>'}
function iBC(){var el=$('bPie');if(!el)return;if(el._c)el._c.destroy();el._c=new Chart(el,{type:'doughnut',data:{labels:['Baru','Diproses','Selesai'],datasets:[{data:[RPT.filter(function(r){return r.st==='baru'}).length||1,RPT.filter(function(r){return r.st==='diproses'}).length||1,RPT.filter(function(r){return r.st==='selesai'}).length||1],backgroundColor:['#ef4444','#f59e0b','#22c55e'],borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:10}}}}})}
function pBR(){return'<div class="pg min-h-screen pb-24">'+BH('Kelola Laporan','bH')+'<div class="px-5 -mt-4 space-y-3">'+RPT.map(function(r){var sc={baru:'bg-red-100 text-red-600 border-red-200',diproses:'bg-amber-100 text-amber-600 border-amber-200',selesai:'bg-emerald-100 text-emerald-600 border-emerald-200'}[r.st];return'<div class="card p-4"><div class="flex items-center justify-between mb-2"><p class="text-sm font-bold text-slate-700">'+r.um+'</p><span class="badge '+sc+'">'+r.st+'</span></div><p class="text-xs text-slate-500 mb-2">'+r.dt+'</p><p class="text-[10px] text-slate-400 mb-3">'+r.dt2+' &bull; '+r.tp+'</p><div class="flex gap-2">'+(r.st!=='selesai'?'<button onclick="uR('+r.id+',\'diproses\')" class="ch px-3 py-1.5 bg-amber-100 text-amber-700 rounded-lg text-[10px] font-bold">Proses</button><button onclick="uR('+r.id+',\'selesai\')" class="ch px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg text-[10px] font-bold">Selesai</button>':'')+'</div></div>'}).join('')+'</div></div>'}
function uR(id,st){var r=RPT.find(function(x){return x.id===id});if(r){r.st=st;toast('Status: '+st,'success');nv('bRp')}}
function pBVou(){return'<div class="pg min-h-screen pb-24">'+BH('Kelola Voucher','bH')+'<div class="px-5 -mt-4 space-y-4"><button onclick="nv(\'bAnE\')" class="ch w-full py-3 bg-uj text-white rounded-xl font-bold text-sm"><i class="fa-solid fa-plus mr-2"></i>Buat Voucher Baru</button>'+VOU.map(function(v){var tgt=v.uid?U.find(function(u){return u.id===v.uid}):null;return'<div class="card p-4 '+(v.act?'':'opacity-60')+'"><div class="flex items-center justify-between mb-2"><p class="text-sm font-bold text-slate-700">'+v.nm+'</p><span class="badge '+(v.act?'bg-emerald-100 text-emerald-600':'bg-slate-100 text-slate-400')+'">'+(v.act?'Aktif':'Nonaktif')+'</span></div><p class="text-[10px] text-slate-400">Kode: <b>'+v.cd+'</b> &bull; '+(tgt?tgt.nm:'Semua UMKM')+'</p><p class="text-[10px] text-slate-400">'+(v.tp==='persen'?'Diskon '+v.val+'%':'Hemat '+fm(v.val))+' &bull; Min. '+fm(v.min)+' &bull; Exp: '+v.exp+'</p><div class="flex items-center justify-between mt-2"><span class="text-[10px] text-slate-400">'+v.used+'/'+v.limit+' dipakai</span><button onclick="toggleV('+v.id+')" class="ch px-3 py-1 text-[10px] font-bold rounded-lg '+(v.act?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-700')+'">'+(v.act?'Nonaktif':'Aktifkan')+'</button></div></div>'}).join('')+'</div></div>'}

function pBA(){return'<div class="pg min-h-screen pb-24">'+BH('Pengumuman','bH')+'<div class="px-5 -mt-4 space-y-4"><button onclick="S._ae=null;nv(\'bAnE\')" class="ch w-full py-3 bg-uj text-white rounded-xl font-bold text-sm"><i class="fa-solid fa-plus mr-2"></i>Buat Pengumuman</button>'+ANN.map(function(a){return'<div class="card '+(a.pin?'border-l-4 border-l-uo':'')+' p-4"><div class="flex items-center justify-between mb-1"><p class="text-sm font-bold text-slate-700 flex-1">'+a.tt+'</p>'+(a.pin?'<i class="fa-solid fa-thumbtack text-uo text-xs"></i>':'')+'</div><p class="text-xs text-slate-500">'+a.tx+'</p><p class="text-[10px] text-slate-400 mt-2">'+a.dt+' &bull; '+a.fr+'</p></div>'}).join('')+'</div></div>'}
function pBAE(){var a=S._ae?ANN.find(function(x){return x.id===S._ae}):null;return'<div class="pg min-h-screen pb-24">'+BH(a?'Edit':'Buat','bAn')+'<div class="px-5 -mt-4"><div class="card p-5 space-y-3"><div><label class="text-xs font-semibold text-slate-500 mb-1 block">Judul</label><input id="anT" type="text" value="'+(a?a.tt:'')+'" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm outline-none"></div><div><label class="text-xs font-semibold text-slate-500 mb-1 block">Isi</label><textarea id="anX" rows="4" class="w-full p-3 text-sm rounded-xl border border-slate-200 outline-none resize-none">'+(a?a.tx:'')+'</textarea></div><div><label class="text-xs font-semibold text-slate-500 mb-1 block">Dari</label><input id="anF" type="text" value="'+(a?a.fr:'BPU')+'" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm outline-none"></div><label class="flex items-center gap-2"><input id="anP" type="checkbox" '+(a&&a.pin?'checked':'')+'><span class="text-sm text-slate-600">Pin</span></label><button onclick="svAn()" class="ch w-full py-3 bg-uj text-white rounded-xl font-bold text-sm"><i class="fa-solid fa-save mr-2"></i>'+(a?'Update':'Simpan')+'</button></div></div></div></div>'}
function svAn(){var t=$('anT').value,x=$('anX').value,f=$('anF').value,p=$('anP').checked;if(!t||!x){toast('Judul dan isi wajib diisi','warning');return}if(S._ae){var a=ANN.find(function(x){return x.id===S._ae});if(a){a.tt=t;a.tx=x;a.fr=f;a.pin=p}}else{ANN.unshift({id:Date.now(),tt:t,dt:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),fr:f,tx:x,pin:p})}toast('Disimpan!','success');nv('bAn')}
function pBL(){return'<div class="pg min-h-screen pb-24">'+BH('Literasi UMKM','bH')+'<div class="px-5 -mt-4 space-y-4"><div class="card p-4 h-48"><canvas id="lBar"></canvas></div><div class="card p-4"><h3 class="font-bold text-sm text-slate-700 mb-2"><i class="fa-solid fa-flask text-uo mr-2"></i>Konteks Penelitian</h3><p class="text-xs text-slate-500 leading-relaxed text-justify">Aplikasi Kantin Pinter dikembangkan berdasarkan penelitian terhadap pelaku UMKM kantin untuk menganalisis faktor-faktor yang memengaruhi penggunaan QRIS, meliputi literasi keuangan digital, persepsi kegunaan, kemudahan, dan keamanan. Hasil analisis digunakan sebagai dasar pengembangan sistem yang mendukung edukasi, monitoring, dan pengelolaan transaksi secara terintegrasi.</p></div></div></div>'}
function iLC(){var el=$('lBar');if(!el)return;if(el._c)el._c.destroy();el._c=new Chart(el,{type:'bar',data:{labels:MD.map(function(m){return m.tt.split(' ').slice(0,2).join(' ')}),datasets:[{label:'Kelulusan %',data:MD.map(function(){return Math.floor(Math.random()*40+50)}),backgroundColor:['#15803d','#3b82f6','#f59e0b','#ef4444'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{font:{size:9},callback:function(v){return v+'%'}}},x:{ticks:{font:{size:8},maxRotation:45}}}}})}
function pBUm(){return'<div class="pg min-h-screen pb-24">'+BH('Data UMKM','bH')+'<div class="px-5 -mt-4 space-y-3"><div class="flex gap-2 mb-1"><input id="sB" type="text" placeholder="Cari..." oninput="fB()" class="flex-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-blue-500 outline-none"><button class="px-3 rounded-xl bg-blue-600 text-white"><i class="fa-solid fa-search text-sm"></i></button></div><div id="bList">'+U.map(function(u){return'<div class="card p-4 mb-2"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-store text-blue-600 text-sm"></i></div><div class="flex-1"><p class="text-xs font-bold text-slate-700">'+u.nm+'</p><p class="text-[10px] text-slate-400">'+u.bk+'-'+u.sl+' &bull; '+u.st+' &bull; '+(u.qr?'QRIS':'No QRIS')+'</p></div></div></div>'}).join('')+'</div></div></div>'}
function fB(){var s=$('sB').value.toLowerCase();$('bList').innerHTML=U.filter(function(u){return u.nm.toLowerCase().indexOf(s)>=0||u.cat.toLowerCase().indexOf(s)>=0||u.bk.toLowerCase().indexOf(s)>=0}).map(function(u){return'<div class="card p-4 mb-2"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-store text-blue-600 text-sm"></i></div><div class="flex-1"><p class="text-xs font-semibold text-slate-700">'+u.nm+'</p><p class="text-[10px] text-slate-400">'+u.bk+'-'+u.sl+' &bull; '+u.st+' &bull; '+(u.qr?'QRIS':'No QRIS')+'</p></div></div></div>'}).join('')}
